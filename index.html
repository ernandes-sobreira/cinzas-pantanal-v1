// ============= FIREBASE SYNC =============
async function saveToFirebase(collection,data){
  if(!fbConnected||!db)return false;
  try{
    // Chunk data into batches of 400 (Firestore batch limit is 500)
    const CHUNK=400;
    for(let i=0;i<data.length;i+=CHUNK){
      const batch=db.batch();
      const chunk=data.slice(i,i+CHUNK);
      chunk.forEach((row,idx)=>{
        const ref=db.collection(collection).doc(String(i+idx));
        const clean={...row};delete clean._id;
        batch.set(ref,clean);
      });
      await batch.commit();
    }
    return true;
  }catch(e){console.error('Save error:',e);return false}
}

async function loadCollection(collection){
  if(!fbConnected||!db)return null;
  try{
    const snap=await db.collection(collection).get();
    if(snap.empty)return null;
    return snap.docs.map(d=>d.data());
  }catch(e){console.error('Load error:',e);return null}
}

async function saveTeamToFirebase(){
  if(!fbConnected||!db)return;
  try{await db.collection('cinzas_config').doc('team').set({members:S.team})}catch(e){console.error(e)}
}

async function loadFromFirebase(){
  pbar(20);
  // Try loading data
  const p1=await loadCollection('cinzas_planilha1');
  pbar(40);
  const ni=await loadCollection('cinzas_nictemeral');
  pbar(60);
  
  if(p1&&p1.length>0){
    S.p1=p1;S.p1.forEach((r,i)=>r._id=i);
    toast('Planilha1: '+p1.length+' registros do Firebase');
  }
  if(ni&&ni.length>0){
    S.ni=ni;S.ni.forEach((r,i)=>r._id=i+10000);
    toast('Nictemeral: '+ni.length+' registros do Firebase');
  }
  
  // Load team
  try{
    const teamDoc=await db.collection('cinzas_config').doc('team').get();
    if(teamDoc.exists&&teamDoc.data().members){S.team=teamDoc.data().members;toast('Equipe carregada do Firebase')}
  }catch(e){}
  
  pbar(100);
  setTimeout(()=>pbar(0),500);
  updateCounts();
  if(S.tab==='geral_overview'||S.tab==='firebase_tab')render();
  S.fbSynced=true;
}

async function syncAllToFirebase(){
  if(!fbConnected||!db){toast('Firebase offline!');return}
  toast('Sincronizando com Firebase...');pbar(10);
  
  // Clear old data first
  async function clearCollection(col){
    const snap=await db.collection(col).get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    if(snap.docs.length>0)await batch.commit();
  }
  
  await clearCollection('cinzas_planilha1');pbar(20);
  await clearCollection('cinzas_nictemeral');pbar(30);
  
  const ok1=await saveToFirebase('cinzas_planilha1',S.p1);pbar(60);
  const ok2=await saveToFirebase('cinzas_nictemeral',S.ni);pbar(80);
  await saveTeamToFirebase();pbar(95);
  
  pbar(100);setTimeout(()=>pbar(0),500);
  if(ok1&&ok2)toast('Tudo sincronizado com Firebase!');
  else toast('Erro parcial na sincronização');
  if(S.tab==='firebase_tab')render();
}

// ============= HELPERS =============
function uq(a,k){return[...new Set(a.map(r=>r[k]))].filter(x=>x!=null).sort()}
function mn(a){const v=a.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0}
function sd(a){const m=mn(a);const v=a.filter(x=>x!=null&&!isNaN(x));return v.length>1?Math.sqrt(v.reduce((a,b)=>a+(b-m)**2,0)/(v.length-1)):0}
function med(a){const v=a.filter(x=>x!=null&&!isNaN(x)).sort((a,b)=>a-b);const m=Math.floor(v.length/2);return v.length%2?v[m]:v.length?(v[m-1]+v[m])/2:0}
function fm(n,d=2){return n!=null&&!isNaN(n)?Number(n).toFixed(d):'—'}
function pr(x,y){const p=[];for(let i=0;i<x.length;i++)if(x[i]!=null&&y[i]!=null&&!isNaN(x[i])&&!isNaN(y[i]))p.push([+x[i],+y[i]]);if(p.length<3)return NaN;const mx=mn(p.map(a=>a[0])),my=mn(p.map(a=>a[1]));let n=0,dx=0,dy=0;p.forEach(([a,b])=>{n+=(a-mx)*(b-my);dx+=(a-mx)**2;dy+=(b-my)**2});return dx&&dy?n/Math.sqrt(dx*dy):0}
function cclr(r){if(isNaN(r))return'#E2E5EB';const v=Math.abs(r);return r>0?`rgba(37,99,235,${.1+v*.8})`:`rgba(239,68,68,${.1+v*.8})`}
function opts(arr,sel,al='Todos'){let h=`<option value="">${al}</option>`;arr.forEach(v=>h+=`<option value="${v}" ${v==sel?'selected':''}>${v}</option>`);return h}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function clM(){document.getElementById('mR').innerHTML=''}
function trtBadge(trt){return`<span class="trt-badge" style="background:${TRT_COLORS[trt]||'#999'}22;color:${TRT_COLORS[trt]||'#999'}">${TRT_SHORT[trt]||trt}</span>`}
function updateCounts(){document.getElementById('recCount').textContent=S.p1.length+' + '+S.ni.length+' registros'}
function getTrt(m){if(!m)return'Outro';m=m.toUpperCase();if(m.startsWith('CR'))return'Controle (0 g/L)';if(m.startsWith('2GR'))return'2 g/L';if(m.startsWith('5GR'))return'5 g/L';if(m.startsWith('10GR'))return'10 g/L';if(m==='RIO')return'Rio (referência)';return'Outro'}

window.handleExcelUpload=function(e){
  const f=e.target.files[0];if(!f)return;
  const status=document.getElementById('uploadStatus');
  const preview=document.getElementById('uploadPreview');
  status.innerHTML='<div class="sync-bar" style="border-color:var(--or);background:var(--orL);color:var(--or)">Lendo: '+f.name+'...</div>';
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      if(typeof XLSX==='undefined'){status.innerHTML='<div class="sync-bar" style="border-color:var(--rd);background:var(--rdL);color:var(--rd)">XLSX nao carregou. Abra no GitHub Pages.</div>';return}
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
      const sheets=wb.SheetNames;
      const mode=document.getElementById('uploadMode')?.value||'replace';
      let newP1=[],newNI=[],report=[];
      const p1Name=sheets.find(s=>s.toLowerCase().includes('planilha'))||sheets[0];
      if(p1Name){const raw=XLSX.utils.sheet_to_json(wb.Sheets[p1Name],{defval:null});newP1=processXlsx(raw);report.push(p1Name+': '+newP1.length)}
      const niName=sheets.find(s=>s.toLowerCase().includes('nictemeral')||s.toLowerCase().includes('nict'));
      if(niName){const raw=XLSX.utils.sheet_to_json(wb.Sheets[niName],{defval:null});newNI=processXlsx(raw);report.push(niName+': '+newNI.length)}
      if(!newP1.length&&!newNI.length){status.innerHTML='<div class="sync-bar" style="border-color:var(--rd);background:var(--rdL);color:var(--rd)">Nenhum dado encontrado.</div>';return}
      const trts=TRT_ORDER.filter(t=>newP1.some(r=>r.Tratamento===t));
      const dates=[...new Set(newP1.map(r=>r.Data))].filter(Boolean).sort();
      preview.innerHTML=`<div class="card" style="margin:0;border-color:var(--gn)"><div class="card-t" style="color:var(--gn)">Dados detectados</div>
        <div class="g4" style="margin-bottom:12px">

          <div class="kpi"><div class="kpi-l">Nictemeral</div><div class="kpi-v">${newNI.length}</div></div>
          <div class="kpi"><div class="kpi-l">Tratamentos</div><div class="kpi-v">${trts.length}</div><div class="kpi-s">${trts.map(t=>TRT_SHORT[t]).join(', ')}</div></div>
          <div class="kpi"><div class="kpi-l">Datas</div><div class="kpi-v">${dates.length}</div><div class="kpi-s">${dates.slice(0,4).join(', ')}${dates.length>4?'...':''}</div></div>
        </div>
        <p style="font-size:11px;color:var(--t2);margin-bottom:10px">${report.join(' | ')} | ${mode==='replace'?'Substituir':'Adicionar'}</p>
        <button class="btn btn-g" style="font-size:14px;padding:10px 20px" onclick="applyUpload()">Aplicar ao dashboard</button></div>`;
      window._pendingUpload={p1:newP1,ni:newNI,mode};
      status.innerHTML='<div class="sync-bar" style="border-color:var(--gn);background:var(--gnL);color:var(--gn)">Arquivo lido! Revise e clique Aplicar.</div>';
    }catch(err){status.innerHTML='<div class="sync-bar" style="border-color:var(--rd);background:var(--rdL);color:var(--rd)">Erro: '+err.message+'</div>'}
  };reader.readAsArrayBuffer(f)};

function processXlsx(raw){
  return raw.map((row,i)=>{
    const r={};
    Object.keys(row).forEach(k=>{
      const key=k.trim();let val=row[k];
      if(val instanceof Date){
        if(key.toLowerCase().includes('data'))val=val.toISOString().slice(0,10);
        else if(key.toLowerCase().includes('hor'))val=val.toTimeString().slice(0,8);
      }
      if(typeof val==='number'&&key.toLowerCase().includes('hor')){const h=Math.floor(val*24);const m=Math.round((val*24-h)*60);val=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':00'}
      r[key]=val;
    });
    if(r.Mesocosmos)r.Mesocosmos=String(r.Mesocosmos).toUpperCase();
    r.Tratamento=getTrt(r.Mesocosmos||'');
    const m=r.Mesocosmos||'';r.Replica_Mesocosmos=m.slice(-1).match(/\d/)?m.slice(-1):'1';
    r._id=Date.now()+i;return r;
  });
}

window.applyUpload=function(){
  const u=window._pendingUpload;if(!u)return;
  if(u.mode==='replace'){
    if(u.p1.length)S.p1=u.p1.map((r,i)=>({...r,_id:i}));
    if(u.ni.length)S.ni=u.ni.map((r,i)=>({...r,_id:i+10000}));
  }else{
    if(u.p1.length){const b=S.p1.length;u.p1.forEach((r,i)=>{r._id=b+i;S.p1.push(r)})}
    if(u.ni.length){const b=S.ni.length+10000;u.ni.forEach((r,i)=>{r._id=b+i;S.ni.push(r)})}
  }
  window._pendingUpload=null;updateCounts();toast('Dados atualizados! '+S.p1.length+' + '+S.ni.length);render()};

window.exportJSON=function(){
  const data={p1:S.p1.map(r=>{const c={...r};delete c._id;return c}),ni:S.ni.map(r=>{const c={...r};delete c._id;return c}),team:S.team,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cinzas_pantanal_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('JSON exportado!')};

window.importJSON=function(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{const data=JSON.parse(ev.target.result);
      if(data.p1){S.p1=data.p1;S.p1.forEach((r,i)=>r._id=i)}
      if(data.ni){S.ni=data.ni;S.ni.forEach((r,i)=>r._id=i+10000)}
      if(data.team)S.team=data.team;
      updateCounts();render();toast('Importado! '+S.p1.length+' + '+S.ni.length);
    }catch(err){toast('Erro JSON')}
  };reader.readAsText(f)};

function rvCorr(d,p){
  const sc=['CO2 flux mg/m2/day)','ph','% OD','mg/L OD','FNU','Temp (°C)','Temperatura (°C)','Umidade (%)','Pressão (hpa)','Iluminação'];
  return`<div class="card"><div class="card-t"><span class="ic">🔗</span>Matriz de Correlação</div>
  <div class="fil">
    <div class="fg"><label class="fl">Variáveis (Ctrl+click)</label><select id="${p}crV" multiple size="6" style="min-width:250px">${NCOLS.map(c=>`<option value="${c}" ${sc.includes(c)?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Filtrar Tratamento</label><select id="${p}crT">${opts(TRT_ORDER.filter(t=>d.some(r=>r.Tratamento===t)),'','Todos')}</select></div>
    <div class="fg"><label class="fl">Filtrar Data</label><select id="${p}crD">${opts(uq(d,'Data'),'','Todas')}</select></div>
    <div class="fg" style="justify-content:flex-end"><label class="fl">&nbsp;</label><button class="btn btn-p" onclick="runCorr('${p}')">Calcular</button></div>
  </div><div id="${p}crM" style="overflow-x:auto"></div>
  <div style="margin-top:14px"><div class="cc" style="height:380px"><canvas id="${p}crS"></canvas></div></div>
  <div id="${p}crDt" style="margin-top:10px"></div></div>`;
}
window.runCorr=function(p){
  let d=[...(p==='g'?S.p1:S.ni)];
  const ft=document.getElementById(p+'crT')?.value;const fd=document.getElementById(p+'crD')?.value;
  if(ft)d=d.filter(r=>r.Tratamento===ft);if(fd)d=d.filter(r=>r.Data===fd);
  const sel=[...document.getElementById(p+'crV').selectedOptions].map(o=>o.value);
  if(sel.length<2){document.getElementById(p+'crM').innerHTML='<p style="color:var(--t3)">Selecione 2+ variáveis.</p>';return}
  const n=sel.length;const mx=[];for(let i=0;i<n;i++){mx[i]=[];for(let j=0;j<n;j++)mx[i][j]=pr(d.map(r=>r[sel[i]]),d.map(r=>r[sel[j]]))}
  const sn=c=>c.length>14?c.substring(0,14)+'…':c;
  let h=`<div class="corr-grid" style="grid-template-columns:90px repeat(${n},1fr)"><div class="corr-c corr-hh" style="background:transparent"></div>`;
  for(let j=0;j<n;j++)h+=`<div class="corr-c corr-h" title="${sel[j]}">${sn(sel[j])}</div>`;
  for(let i=0;i<n;i++){h+=`<div class="corr-c corr-hh" style="background:var(--s1);font-size:8px;font-weight:600;color:var(--t2);padding:5px">${sn(sel[i])}</div>`;
    for(let j=0;j<n;j++){const r=mx[i][j];const tc=Math.abs(r)>.6?'#fff':'var(--tx)';h+=`<div class="corr-c" style="background:${cclr(r)};color:${tc}" onclick="scC('${p}','${sel[i]}','${sel[j]}')" title="${sel[i]} × ${sel[j]}: r=${fm(r,3)}">${fm(r,2)}</div>`}}
  h+='</div>';document.getElementById(p+'crM').innerHTML=h;
  const pairs=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)if(!isNaN(mx[i][j]))pairs.push({a:sel[i],b:sel[j],r:mx[i][j]});
  pairs.sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
  document.getElementById(p+'crDt').innerHTML=`<div class="card-t" style="margin-top:6px">Top Correlações</div><table><tr><th>Var A</th><th>Var B</th><th>r</th></tr>${pairs.slice(0,10).map(q=>`<tr><td>${sn(q.a)}</td><td>${sn(q.b)}</td><td class="n" style="color:${q.r>0?'var(--ac)':'var(--rd)'};font-weight:600">${fm(q.r,3)}</td></tr>`).join('')}</table>`;
};
window.scC=function(p,a,b){
  let d=[...(p==='g'?S.p1:S.ni)];

  if(ft)d=d.filter(r=>r.Tratamento===ft);if(fd)d=d.filter(r=>r.Data===fd);

window.edTm=function(i){const t=S.team[i];document.getElementById('mR').innerHTML=`<div class="mo" onclick="if(event.target===this)clM()"><div class="mod"><h3>Editar Membro</h3><label>Nome</label><input id="tmN" value="${t.name}"><label>Função</label><input id="tmR" value="${t.role}"><div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="clM()">Cancelar</button><button class="btn btn-p" onclick="upTm(${i})">Salvar</button></div></div></div>`};
window.upTm=function(i){S.team[i].name=document.getElementById('tmN').value.trim()||S.team[i].name;S.team[i].role=document.getElementById('tmR').value.trim()||S.team[i].role;clM();toast('Atualizado!');render()};
window.rmTm=function(i){if(!confirm('Remover '+S.team[i].name+'?'))return;S.team.splice(i,1);toast('Removido!');render()};

init();
</script>
</body>
</html>
